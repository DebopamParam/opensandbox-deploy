# OpenSandbox — GCP VM with gVisor (Docker mode, no K8s)
# Templated by start-server.sh from .env values

[server]
host = "0.0.0.0"
port = {{SANDBOX_PORT}}
log_level = "{{SANDBOX_LOG_LEVEL}}"
api_key = "{{SANDBOX_API_KEY}}"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.10"

[docker]
network_mode = "bridge"
api_timeout = 300
drop_capabilities = ["SYS_ADMIN", "NET_RAW", "SYS_PTRACE", "MKNOD", "AUDIT_WRITE", "NET_BIND_SERVICE"]
no_new_privileges = true
pids_limit = 512

[secure_runtime]
type = "gvisor"
docker_runtime = "runsc"

[egress]
image = "opensandbox/egress:v1.0.1"
